version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: leadforge-postgres
    environment:
      POSTGRES_USER: leadforge
      POSTGRES_PASSWORD: leadforge_password
      POSTGRES_DB: leadforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadforge-network

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: leadforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadforge-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge-backend
    environment:
      DATABASE_URL: postgresql://leadforge:leadforge_password@postgres:5432/leadforge
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEVERBOUNCE_API_KEY: ${NEVERBOUNCE_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./scrapers:/app/scrapers
      - ./ai-services:/app/ai-services
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - leadforge-network

  # Celery Worker for scraping and email tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge-celery-worker
    environment:
      DATABASE_URL: postgresql://leadforge:leadforge_password@postgres:5432/leadforge
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEVERBOUNCE_API_KEY: ${NEVERBOUNCE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./scrapers:/app/scrapers
      - ./ai-services:/app/ai-services
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info
    networks:
      - leadforge-network

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge-celery-beat
    environment:
      DATABASE_URL: postgresql://leadforge:leadforge_password@postgres:5432/leadforge
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info
    networks:
      - leadforge-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leadforge-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - leadforge-network

  # n8n Automation Platform
  n8n:
    image: n8nio/n8n:latest
    container_name: leadforge-n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: n8n_password_change_in_production
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    depends_on:
      - backend
    networks:
      - leadforge-network

  # Flower for Celery monitoring
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leadforge-flower
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555
    networks:
      - leadforge-network

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  leadforge-network:
    driver: bridge
